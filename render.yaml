services:
  - type: web
    name: mathsmayhem
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn mathsmayhem.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: mathsmayhem-db
          property: connectionString

databases:
  - name: mathsmayhem-db
    databaseName: mathsmayhem
    user: mathsmayhem
